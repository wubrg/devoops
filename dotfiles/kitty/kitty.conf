# Personal Kitty baseline promoted from the current device's effective settings.
# Keep machine-local overrides in ~/.config/devoops/kitty/local.conf.

font_size 13.0
remember_window_size yes
enabled_layouts tall, fat, stack, grid

foreground #abb2bf
background #23272e
selection_foreground #d7dae0
selection_background #2c313a
url_color #61afef
color0 #3f4451
color8 #4f5666
color1 #e05561
color9 #ff616e
color2 #8cc265
color10 #a5e075
color3 #d18f52
color11 #f0a45d
color4 #4aa5f0
color12 #4dc4ff
color5 #c162de
color13 #de73ff
color6 #42b3c2
color14 #4cd1e0
color7 #d7dae0
color15 #e6e6e6
inactive_border_color #3e4452
bell_border_color #e06c75
active_border_color #457dff
active_tab_foreground #23272e
active_tab_background #dcdcdc
inactive_tab_foreground #b4b4b4
inactive_tab_background #323842

map kitty_mod+l next_layout
map ctrl+alt+t goto_layout tall
map ctrl+alt+s goto_layout stack
map ctrl+alt+p last_used_layout
map ctrl+alt+z toggle_layout stack
